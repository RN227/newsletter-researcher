name: Generate Brew & AI draft

on:
  schedule:
    - cron: "0 10 * * SAT"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-draft:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate newsletter draft
        run: |
          python -m scripts.orchestrator --issue-number 20

      - name: Commit newsletters back to repo
        run: |
          if [ -d "newsletters" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add newsletters/
            if ! git diff --cached --quiet; then
              git commit -m "Add autogenerated Brew & AI draft"
              git push origin main
            fi
          fi

      - name: Upload drafts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-draft
          path: newsletters/

